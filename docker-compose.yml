services:

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  fraud-app:
    build: .
    ports:
      - "0.0.0.0:8080:8080"
    environment:
      - SPRING_ELASTICSEARCH_URIS=${ES_HOST}
      - SPRING_ELASTICSEARCH_USERNAME=${ES_USERNAME}
      - SPRING_ELASTICSEARCH_PASSWORD=${ES_PASSWORD}
      - FRAUD_LOG_DIR=/logs
      - GEOIP_DB_PATH=${GEOIP_DB_PATH:-}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=
      - VITE_TENANT_ID=tenant-1
    depends_on:
      - fraud-app

  # On-demand IP feed sync: docker compose run ip-feed-sync
  ip-feed-sync:
    image: curlimages/curl:latest
    profiles: ["sync"]
    volumes:
      - ./scripts:/scripts
    environment:
      - ES_HOST=${ES_HOST}
      - ES_USERNAME=${ES_USERNAME}
      - ES_PASSWORD=${ES_PASSWORD}
    entrypoint: ["sh", "/scripts/sync-ip-feeds.sh"]

volumes:
  redis-data:
