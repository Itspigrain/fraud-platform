services:

  elasticsearch:
    image: elasticsearch:8.15.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 5s
      retries: 10

  init-templates:
    image: curlimages/curl:latest
    depends_on:
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./elasticsearch:/elasticsearch
    entrypoint: ["sh", "/elasticsearch/init-templates.sh"]

  logstash:
    image: logstash:8.15.0
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
      - app-logs:/logs
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - LS_JAVA_OPTS=-Xms256m -Xmx256m

  kibana:
    image: kibana:8.15.0
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=fraud-platform-kibana-encryption-key-32ch
      - XPACK_REPORTING_ENCRYPTIONKEY=fraud-platform-kibana-reporting-key-32chars
      - XPACK_SECURITY_ENCRYPTIONKEY=fraud-platform-kibana-security-key-32chars
    depends_on:
      elasticsearch:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  fraud-app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SPRING_ELASTICSEARCH_URIS=http://elasticsearch:9200
      - FRAUD_LOG_DIR=/logs
      - GEOIP_DB_PATH=${GEOIP_DB_PATH:-}
      - REDIS_HOST=redis
    volumes:
      - app-logs:/logs
    depends_on:
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
      logstash:
        condition: service_started

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8080
    depends_on:
      - fraud-app
    volumes:
      - ./frontend/src:/app/src

volumes:
  es-data:
  app-logs:
  redis-data:
