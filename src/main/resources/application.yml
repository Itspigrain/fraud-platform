spring:
  elasticsearch:
    uris: ${SPRING_ELASTICSEARCH_URIS:http://localhost:9200}
    username: ${SPRING_ELASTICSEARCH_USERNAME:}
    password: ${SPRING_ELASTICSEARCH_PASSWORD:}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  cache:
    type: redis
    redis:
      time-to-live: 60s
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
  endpoint:
    health:
      show-details: when-authorized

# ─────────────────────────────────────────────────────────────
# Ingest pipeline names — must match what init-templates.sh loaded.
# The Java repository layer appends ?pipeline=<name> to index requests.
# ─────────────────────────────────────────────────────────────
elasticsearch:
  pipelines:
    events: pipeline-events
    alerts: pipeline-alerts
    audit:  pipeline-audit
    applogs: pipeline-applogs

fraud:
  pipeline:
    log-dir: ${FRAUD_LOG_DIR:logs}
  geoip:
    database-path: ${GEOIP_DB_PATH:}
  rules:
    suspicious-ip:
      # Seed blocklist — supplement with live feeds via sync-ip-feeds.sh
      blocked-ips:
        - 10.0.0.1
      high-risk-countries:
        - North Korea
        - Iran
        - Syria

tenant:
  header-name: X-Tenant-Id
  super-tenant-value: __super__
  excluded-paths:
    - /actuator
