spring:
  elasticsearch:
    uris: ${SPRING_ELASTICSEARCH_URIS:http://localhost:9200}
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/fraud_platform?createDatabaseIfNotExist=true
    username: ${MYSQL_USER:fraud}
    password: ${MYSQL_PASSWORD:fraud}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cache:
    type: redis
    redis:
      time-to-live: 60s
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
  endpoint:
    health:
      show-details: always

fraud:
  pipeline:
    log-dir: ${FRAUD_LOG_DIR:logs}
  geoip:
    database-path: ${GEOIP_DB_PATH:}
  rules:
    suspicious-ip:
      blocked-ips:
        - 10.0.0.1
      high-risk-countries:
        - North Korea
        - Iran
        - Syria

tenant:
  header-name: X-Tenant-Id
  super-tenant-value: __super__
  excluded-paths:
    - /actuator
